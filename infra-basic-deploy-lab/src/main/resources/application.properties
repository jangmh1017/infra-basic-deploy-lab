# src/main/resources/application.properties (로컬 : Git 제외 대상)
server.port=8080
spring.application.name=deploy-lab

# MySQL 연결 (로컬 MySQL 있는 경우)
spring.datasource.url=jdbc:mysql://localhost:3306/deploydb?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
spring.datasource.username=deploy
spring.datasource.password=deploy1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA 설정
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect